name: Deploy Docker Node.js to EC2

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        working-directory: Server
        run: |
          docker build -t hustlove-be:${{ env.IMAGE_TAG }} .

      - name: Save Docker image
        working-directory: Server
        run: |
          docker save hustlove-be:${{ env.IMAGE_TAG }} \
            | gzip > image.tar.gz

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to EC2
        run: |
          scp Server/image.tar.gz \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/

      - name: Deploy on EC2
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} << EOF
            docker stop hustlove-be || true
            docker rm hustlove-be || true

            gunzip -c /home/ubuntu/image.tar.gz | docker load

            docker run -d \
              --name hustlove-be \
              -p 5000:5000 \
              --env-file /home/ubuntu/.env \
              --restart unless-stopped \
              hustlove-be:${{ env.IMAGE_TAG }}

            docker image prune --all --force
          EOF
